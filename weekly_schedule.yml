# Weekly schedule for automatic Clockify uploads
# Copy this file to weekly_schedule.yml and customize it.
#
# The script uses this file when you run the "weekly" workflow.
# Times are interpreted in the specified timezone and converted to UTC automatically.

timezone: "America/Argentina/Buenos_Aires"

# ── Default schedule ───────────────────────────────────────────────────────────
# Applied every week unless a specific week overrides a day.
# Omit a day entirely (or set it to []) to mark it as a day off.



  # saturday: []   # descomentá para marcar sábado como día libre explícitamente
  # sunday: []     # el domingo no aparece en default, así que ya se ignora


# ── Overrides por semana ───────────────────────────────────────────────────────
# Para semanas que se desvían del default.
# Solo listá los días que cambian — el resto usa el default.
# Clave: lunes de la semana en formato YYYY-MM-DD.

weeks:
  "2026-05-04":
   monday:
    - start: "09:00"
      end: "13:00"
      description: "Desarrollo"
      project: "BESS AMBA"
      billable: true
    - start: "14:00"
      end: "18:00"
      description: "Reuniones y planificación"
      project: "CTBRA"
      billable: false

  tuesday:
    - start: "09:00"
      end: "18:00"
      description: "Desarrollo"
      project: "BESS SADI"
      billable: true
