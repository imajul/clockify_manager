name: Convert Projects Excel to JSON

on:
  push:
    branches: [main]
    paths: [projects.xlsx]

jobs:
  convert:
    name: Convert projects.xlsx → docs/projects.json
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Convert Excel to JSON
        run: python scripts/convert_projects.py

      - name: Commit projects.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/projects.json
          git diff --staged --quiet || git commit -m "Update projects.json from projects.xlsx"
          git push
